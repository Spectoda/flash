<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Spectoda Flashovatko</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@4.19.0/css/xterm.css" />
    <link href="https://fonts.googleapis.com/css?family=Orbitron" rel="stylesheet" />
    <link rel="icon" href="../assets/apple-touch-icon.png" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@4.19.0/lib/xterm.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/4.19.0/addons/fit/fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <style>
      body {
        background: rgb(23, 25, 36);
        color: white;
      }
      h1,
      h2,
      h3,
      h4,
      label,
      th,
      b,
      p,
      input[type="file"] {
        color: white !important;
      }
      input[type="text"],
      .thead-light,
      select {
        color: black !important;
      }

      .header-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 16px;
      }

      .action-bar {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 24px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 8px;
      }

      .action-bar select {
        padding: 10px 16px;
        font-size: 14px;
        border-radius: 6px;
        border: 1px solid #444;
        background: #2a2d3a;
        color: white !important;
        cursor: pointer;
      }

      .action-bar .btn-flash {
        padding: 12px 28px;
        font-size: 16px;
        font-weight: 600;
        background: linear-gradient(135deg, #5e81f2, #4a6cd4);
        border: none;
        border-radius: 6px;
        color: white;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .action-bar .btn-flash:hover:not(:disabled) {
        background: linear-gradient(135deg, #6b8ef5, #5777e0);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(94, 129, 242, 0.3);
      }

      .action-bar .btn-erase {
        padding: 12px 20px;
        font-size: 14px;
        font-weight: 500;
        background: #dc3545;
        border: none;
        border-radius: 6px;
        color: white;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .action-bar .btn-erase:hover:not(:disabled) {
        background: #c82333;
        transform: translateY(-1px);
      }

      .action-bar .btn-flash:disabled,
      .action-bar .btn-erase:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .baudrate-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .baudrate-group label {
        font-size: 13px;
        color: #aaa !important;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="header-container">
      <img src="../assets/spectoda-logo-new.svg" height="32" style="vertical-align: middle" crossorigin />
      <h1 style="font-size: 16px; margin: 0">Flash tool</h1>
    </div>

    <div id="safariErr" style="display: none">
      <p align="center" style="color: red">This tool is not supported on Safari browser!</p>
    </div>

    <div class="container flex" id="main">
      <a
        href="https://app.clickup.com/4663973/v/dc/4ean5-134/4ean5-36441"
        style="margin-bottom: 5px; display: block"
        target="_blank"
      >
        Instructions for flashing a controller
      </a>

      <details id="advanced-controls">
        <summary>
          <div class="btn btn-secondary btn-sm d-block mx-auto" style="background-color: gray">Advanced controls</div>
        </summary>
        <div id="program">
          <h3>Program</h3>
          <h5 style="color: orangered">Use this only if you know what are you doing.</h5>

          <label for="baudrates" id="lblBaudrate">Baudrate:</label>
          <label style="display: none" id="lblConnTo">Connected to device: </label>
          <select name="baudrates" id="baudrates">
            <option value="921600">921600</option>
            <option value="460800">460800</option>
            <option value="230400">230400</option>
            <option value="115200">115200</option>
          </select>

          <input class="btn btn-primary btn-" type="button" id="connectButton" value="Connect" />
          <input class="btn btn-info btn-sm" type="button" id="copyTraceButton" value="Copy Trace" />
          <input class="btn btn-warning btn-sm" type="button" id="disconnectButton" value="Disconnect" />
          <input class="btn btn-danger btn-sm" type="button" id="eraseButton" value="Erase Flash" />
          <br />

          <div class="alert alert-danger alert-dismissible" id="alertDiv" style="display: none; margin-top: 10px">
            <a href="#" class="close" aria-label="close" onclick="$('.alert').hide()">&times;</a>
            <span id="alertmsg"></span>
          </div>

          <div id="files">
            <table class="table table-striped" id="fileTable">
              <thead class="thead-light">
                <tr>
                  <th>Flash Address</th>
                  <th>File</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
            <input class="btn btn-info btn-sm" type="button" id="addFile" value="Add File" />
          </div>
          <output id="list"></output>
        </div>

        <div id="console">
          <h3>Debug Console</h3>
          <label style="display: none" id="lblConsoleFor">Connected to device: </label>

          <input class="btn btn-info" type="button" id="consoleStartButton" value="Start" />
          <input class="btn btn-info" type="button" id="consoleStopButton" value="Stop" />
          <input class="btn btn-info" type="button" id="resetButton" value="Reset" />
        </div>
      </details>

      <div class="action-bar">
        <div class="baudrate-group">
          <label for="mainBaudrate">Baudrate:</label>
          <select name="mainBaudrate" id="mainBaudrate">
            <option value="921600">921600</option>
            <option value="460800">460800</option>
            <option value="230400">230400</option>
            <option value="115200">115200</option>
          </select>
        </div>
        <button class="btn-flash" type="button" id="programButton">
          Flash Controller
        </button>
        <button class="btn-erase" type="button" id="eraseControllerButton">
          Erase Flash
        </button>
      </div>

      <div
        id="msg"
        style="margin: 16px; font-size: 13px; margin-left: auto; margin-right: auto; color: lightgray; text-align: center"
      ></div>

      <div class="terminal-wrapper">
        <div id="terminal"></div>
      </div>
    </div>
    <script src="index.ts" type="module"></script>
    <script>
      // Safari 3.0+ "[object HTMLElementConstructor]"
      var isSafari =
        /constructor/i.test(window.HTMLElement) ||
        (function (p) {
          return p.toString() === "[object SafariRemoteNotification]";
        })(!window["safari"] || (typeof safari !== "undefined" && window["safari"].pushNotification));

      if (isSafari) {
        document.getElementById("safariErr").style.display = "inline";
        document.getElementById("main").style.display = "none";
      }
    </script>
  </body>
</html>
